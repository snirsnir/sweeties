<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweeties | ממשק ניהול</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
    <div class="login-card">
        <img src="logos/pink.png" alt="Sweeties" class="login-logo">
        <h1>ממשק ניהול</h1>
        <p class="login-sub">Sweeties | קופסאות ניפוץ 💜</p>
        <button id="google-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            התחברי עם Google
        </button>
    </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard" class="hidden">
    <header class="admin-header">
        <div class="header-right">
            <img src="logos/pink.png" alt="Sweeties" class="header-logo">
            <span class="header-title">ממשק ניהול</span>
        </div>
        <div class="header-left">
            <span id="user-name"></span>
            <button id="logout-btn">התנתקות</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="action-grid">
            <div class="action-card" onclick="openCreateModal()">
                <div class="action-icon">📋</div>
                <h2>יצירת הסכם הזמנה</h2>
                <p>צרי קישור הזמנה אישי ושלחי ללקוחה</p>
                <button class="btn-pink" onclick="openCreateModal(); event.stopPropagation();">צרי הזמנה חדשה</button>
            </div>
            <div class="action-card" onclick="previewDemoInvite()">
                <div class="action-icon">🎉</div>
                <h2>הדגמת הזמנה</h2>
                <p>תצוגה מקדימה של עיצוב ההזמנה עם נתוני דוגמא</p>
                <button class="btn-pink" onclick="previewDemoInvite(); event.stopPropagation();">הצגת דוגמא</button>
            </div>
        </div>

        <!-- הזמנות ממתינות -->
        <section class="orders-section">
            <h2>⏳ הזמנות ממתינות למילוי</h2>
            <div id="orders-container"><div class="loading">טוען…</div></div>
        </section>

        <!-- אירועים שנסגרו -->
        <section class="orders-section" style="margin-top:40px;">
            <h2>✅ אירועים שנסגרו</h2>
            <div id="events-container"><div class="loading">טוען…</div></div>
        </section>
    </main>
</div>

<!-- ── CREATE ORDER MODAL ── -->
<div id="create-modal" class="modal-overlay hidden">
    <div class="modal">
        <button class="modal-close" onclick="closeCreateModal()" aria-label="סגור">✕</button>
        <h2>הזמנה חדשה</h2>

        <div class="form-group">
            <label for="customer-name-input">שם הלקוחה</label>
            <input type="text" id="customer-name-input" placeholder="שם מלא" autocomplete="off">
        </div>

        <div id="create-btn-section">
            <button id="create-btn" class="btn-pink" onclick="createOrder()" style="width:100%;">צרי קישור הזמנה</button>
        </div>

        <div id="generated-link-section" class="hidden" style="margin-top:20px;">
            <div class="form-group">
                <label>קישור ללקוחה</label>
                <div class="link-box">
                    <input type="text" id="generated-link" readonly>
                    <button onclick="copyLink()">העתקי</button>
                </div>
            </div>
            <p class="link-hint">שלחי קישור זה ללקוחה דרך WhatsApp</p>
            <a id="whatsapp-link" href="#" target="_blank" rel="noopener" class="btn-whatsapp">📱 שלחי ב-WhatsApp</a>
        </div>
    </div>
</div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
